<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จำลองแอปที่ 3</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 350px;
        }
        .logo-placeholder {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn-chatchat {
            display: inline-block;
            background-color: #2C7A7B;
            color: white;
            text-decoration: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(44, 122, 123, 0.3);
        }
        .btn-chatchat:hover {
            background-color: #236162;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">🎮</div>
        <h2>แอปเกม ABC</h2>
        <p>คุณกำลังจะเข้าสู่ระบบเกม ABC<br>เพื่อความรวดเร็ว คุณสามารถใช้บัญชี ChatChat ล็อกอินได้ทันที</p>
        
        <!-- 🔗 นี่คือจุดสำคัญ! ลิงก์ที่ยิง Deep Link ไปหาแอป ChatChat ของคุณ -->
        <a href="chatchat://oauth/authorize?client_id=game_abc_12345&redirect_uri=https://example-game.com/callback&state=secure_random_xyz&scope=profile email" class="btn-chatchat">
            ล็อกอินด้วย ChatChat
        </a>
    </div>

</body>
</html>
